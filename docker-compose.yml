services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
      - "3001:3001"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - uploads:/app/uploads
      - ebay_session:/app/.ebay-session
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
    stdin_open: true
    tty: true
    shm_size: '1gb'

volumes:
  node_modules:
  uploads:
  ebay_session:
